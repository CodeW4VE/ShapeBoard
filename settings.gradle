pluginManagement {
	repositories {
		maven {
			name = 'Fabric'
			url = 'https://maven.fabricmc.net/'
		}
		mavenCentral()
		gradlePluginPortal()
	}
}

plugins {
	// Downloads the JDK the toolchain asks for if none is installed
	id 'org.gradle.toolchains.foojay-resolver-convention' version '1.0.0'
}

// Should match your modid
rootProject.name = 'shapeboard'
